<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roadtrip 2026 – Augustus</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css"/>
<style>
:root{--bg:#0f1729;--surface:#1a2340;--card:#212d4a;--text:#e8eaf0;--muted:#8892a8;--accent:#ff9f48;--accent2:#48a9ff;--radius:12px;--font-head:'Bebas Neue',sans-serif;--font-body:'Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;padding-bottom:100px}
h1,h2,h3{font-family:var(--font-head);letter-spacing:1px}
.container{max-width:900px;margin:0 auto;padding:0 16px}
.hero{text-align:center;padding:48px 16px 24px}
.hero .kicker{font-size:.85rem;text-transform:uppercase;letter-spacing:3px;color:var(--accent);margin-bottom:8px}
.hero h1{font-size:clamp(2.2rem,6vw,3.5rem);line-height:1.1}
.hero .sub{color:var(--muted);margin-top:8px;font-size:.95rem}
.stats{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;padding:16px 0 24px}
.stat{text-align:center}.stat .val{font-family:var(--font-head);font-size:1.8rem;color:var(--accent)}.stat .lbl{font-size:.75rem;color:var(--muted);text-transform:uppercase}
/* Map - sticky when scrolling */
.map-section{position:sticky;top:0;z-index:100;transition:height .3s}
.map-section.compact{height:140px}
.map-wrap{border-radius:0 0 var(--radius) var(--radius);overflow:hidden;height:300px;transition:height .3s}
.map-section.compact .map-wrap{height:140px}
#map{height:100%;width:100%;background:var(--bg)}
.map-day-label{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:600;background:rgba(15,23,41,.9);backdrop-filter:blur(8px);padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:700;color:var(--accent);border:1px solid var(--accent);pointer-events:none;white-space:nowrap;transition:opacity .2s}
/* Calendar */
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 0;scrollbar-width:none;position:sticky;top:300px;z-index:99;background:var(--bg);transition:top .3s}
.map-section.compact~.cal-wrap{top:140px}
.cal-wrap::-webkit-scrollbar{display:none}
.cal{display:flex;gap:8px;padding:0 16px;min-width:max-content}
.cal-day{min-width:62px;padding:10px 8px;border-radius:var(--radius);background:var(--surface);text-align:center;cursor:pointer;border:2px solid transparent;transition:.2s;position:relative}
.cal-day:hover{border-color:var(--accent)}
.cal-day.active{border-color:var(--accent);background:var(--card);box-shadow:0 0 12px rgba(255,159,72,.2)}
.cal-day.drive::after{content:'';position:absolute;bottom:4px;left:20%;right:20%;height:3px;border-radius:2px;background:var(--accent)}
.cal-day .wd{font-size:.7rem;color:var(--muted);text-transform:uppercase}
.cal-day .dn{font-size:1.1rem;font-weight:700}
.cal-day .em{font-size:1.2rem;margin:2px 0}
.cal-day .loc{font-size:.6rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58px}
/* Day cards */
.days{padding:16px 16px 0}
.day-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;border-left:4px solid transparent;transition:border-color .3s,box-shadow .3s;scroll-margin-top:380px}
.day-card.active{border-left-color:var(--accent);box-shadow:0 0 20px rgba(255,159,72,.1)}
.day-card .date-hdr{font-family:var(--font-head);font-size:1.3rem;margin-bottom:6px;display:flex;align-items:center;gap:12px}
.day-card .date-hdr .day-emoji{font-size:1.4rem}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase;margin-bottom:12px}
.badge-drive{background:var(--accent);color:#000}
.badge-explore{background:rgba(126,224,192,.2);color:#7ee0c0}
.badge-beach{background:rgba(92,224,214,.2);color:#5ce0d6}
.badge-chill{background:rgba(255,207,107,.2);color:#ffcf6b}
.drive-info{background:var(--surface);border-radius:8px;padding:14px;margin-bottom:14px;border-left:4px solid var(--accent)}
.drive-info .route-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;margin-bottom:4px;letter-spacing:1px}
.drive-info .from-to{font-size:1.1rem;font-weight:700}
.drive-info .meta{display:flex;gap:16px;margin-top:6px;font-size:.85rem;color:var(--muted)}
.drive-info .desc{margin-top:8px;font-size:.82rem;color:var(--muted);font-style:italic}
.day-card ul{list-style:none;padding:0}.day-card li{padding:4px 0;font-size:.9rem}.day-card li::before{content:'• ';color:var(--accent)}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}.tag{background:var(--surface);padding:3px 8px;border-radius:6px;font-size:.7rem;color:var(--muted)}
/* Tips */
.tips{margin:24px 16px;background:var(--card);border-radius:var(--radius);padding:20px}
.tips h2{font-size:1.3rem;margin-bottom:12px;color:var(--accent)}
.tips li{font-size:.88rem;margin-bottom:6px;color:var(--muted);list-style:none}.tips li::before{content:'💡 '}
/* FAB */
.fab{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;align-items:center;gap:10px;background:rgba(33,45,74,.95);backdrop-filter:blur(12px);border:2px solid var(--accent);border-radius:40px;padding:10px 18px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:.3s;user-select:none;-webkit-tap-highlight-color:transparent}
.fab:hover{transform:scale(1.05)}
.fab .emoji{font-size:1.4rem}
.fab .lbl{font-size:.82rem;font-weight:700;color:var(--text)}
footer{text-align:center;color:var(--muted);font-size:.8rem;padding:32px 16px;border-top:1px solid rgba(255,255,255,.06)}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="hero container" id="hero">
<div class="kicker" id="kicker"></div>
<h1 id="title"></h1>
<p class="sub" id="sub"></p>
</div>
<div class="stats container" id="stats"></div>

<div class="map-section" id="map-section">
<div class="map-wrap"><div id="map"></div></div>
<div class="map-day-label" id="map-label"></div>
</div>

<div class="cal-wrap" id="cal-wrap"><div class="cal" id="cal"></div></div>

<div class="container">
<div class="days" id="days"></div>
<div class="tips" id="tips"></div>
</div>

<footer>Roadtrip 2026 · Gezin Smets-Gegg · aug 2026<br>Gemaakt door <a href="https://github.com/ewouds/roadtrip26">Koda 🐾</a></footer>

<div class="fab" id="fab" onclick="toggle()"></div>

<script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
<script>
const SPANJE=[
{wd:'vr',d:1,type:'drive',emoji:'🚗',loc:'Hove→Basken.',from:'Hove',to:'Baskenland',km:1000,time:'~10u (2 dagen)',route:'A-wegen via Parijs/Bordeaux, overnachting Frankrijk',acts:['Roadtrip dag 1+2','Overnachting onderweg in Frankrijk','Scenic stops langs de route'],tags:['drive','france','long'],leg:0},
{wd:'za',d:2,type:'explore',emoji:'🏖️',loc:'Baskenland',acts:['Gaztelugatxe (Game of Thrones eiland)','San Sebastián oude stad + pintxos','Zwemmen Golf van Biskaje'],tags:['explore','coast','culture'],leg:1},
{wd:'zo',d:3,type:'drive',emoji:'🚗',loc:'→Picos',from:'Baskenland',to:'Picos de Europa',km:300,time:'~3.5u',route:'Kustweg A8 langs Cantabrische zee',acts:['Kustroute met uitzichtpunten','Aankomst Picos de Europa'],tags:['drive','coast'],leg:1},
{wd:'ma',d:4,type:'explore',emoji:'🥾',loc:'Picos',acts:['Lagos de Covadonga (bergmeren)','Korte wandelingen rond de meren','Bergdorpjes verkennen'],tags:['hike','mountains','lakes'],leg:2},
{wd:'di',d:5,type:'explore',emoji:'🥾',loc:'Picos',acts:['Ruta del Cares (12km kloofwandeling)','Fuente Dé kabelbaan (1800m)','Spectaculaire bergpanoramas'],tags:['hike','gorge','cable car'],leg:2},
{wd:'wo',d:6,type:'drive',emoji:'🚗',loc:'→Llanes',from:'Picos de Europa',to:'Llanes kust',km:80,time:'~1.5u',route:'N634/A8 kustweg',acts:['Korte rit naar de kust','Strandmiddag','Llanes oude centrum verkennen'],tags:['drive','beach','short'],leg:2},
{wd:'do',d:7,type:'beach',emoji:'🏖️',loc:'Llanes',acts:['Playa de Gulpiyuri (inland strand!)','Diverse stranden langs de kust','Relaxen en zwemmen'],tags:['beach','chill','unique'],leg:3},
{wd:'vr',d:8,type:'drive',emoji:'🚗',loc:'→Ordesa',from:'Llanes',to:'Torla/Ordesa',km:500,time:'~5.5u',route:'A8→A67→N260, laadstop Huesca',acts:['Roadtrip door Noord-Spanje','Stop in middeleeuws Aínsa','Aankomst Ordesa vallei'],tags:['drive','mountains','medieval'],leg:3},
{wd:'za',d:9,type:'explore',emoji:'🥾',loc:'Ordesa',acts:['Ordesa-vallei wandeling','Cola de Caballo trail','Spectaculaire watervallen'],tags:['hike','waterfall','national park'],leg:4},
{wd:'zo',d:10,type:'explore',emoji:'🥾',loc:'Ordesa',acts:['Faja de Pelay (panoramapad)','Canyon Añisclo (optioneel)','Berglandschappen'],tags:['hike','canyon','views'],leg:4},
{wd:'ma',d:11,type:'drive',emoji:'🚗',loc:'→Gavarnie',from:'Torla',to:'Gavarnie (FR)',km:150,time:'~2.5u',route:'Col du Pourtalet of Bielsa tunnel',acts:['Bergpas naar Frankrijk','Wandeling Cirque de Gavarnie','UNESCO werelderfgoed'],tags:['drive','mountains','france'],leg:4},
{wd:'di',d:12,type:'chill',emoji:'😌',loc:'Gavarnie',acts:['UNESCO Cirque de Gavarnie','Pont d\'Espagne (optioneel)','Terrassen en relaxen'],tags:['chill','unesco','relax'],leg:5},
{wd:'wo',d:13,type:'drive',emoji:'🚗',loc:'→Loire',from:'Gavarnie',to:'Loire/Bourgogne',km:500,time:'~5.5u',route:'A64→A20, laadstop Limoges',acts:['Roadtrip door Zuid-Frankrijk','Laadstop Limoges','Overnachting Loire/Bourgogne'],tags:['drive','france','return'],leg:5},
{wd:'do',d:14,type:'drive',emoji:'🏠',loc:'→Hove',from:'Loire',to:'Hove',km:500,time:'~5u',route:'A6→A26→E17, laadstop Reims',acts:['Laatste roadtrip-dag','Laadstop Reims','Thuiskomst! 🎉'],tags:['drive','home','return'],leg:6},
{wd:'vr',d:15,type:'chill',emoji:'😴',loc:'Thuis',acts:['Uitpakken','Uitrusten','Vakantie verwerken'],tags:['home','chill','rest'],leg:6}
];
const SLOWAKIJE=[
{wd:'vr',d:1,type:'drive',emoji:'🚗',loc:'Hove→Moezel',from:'Hove',to:'Moezelstreek',km:250,time:'~2.5u',route:'E313→E25',acts:['Korte rit naar Duitsland','Zwemmen in de Moezel','Relaxen aan de rivier'],tags:['drive','river','short'],leg:0},
{wd:'za',d:2,type:'explore',emoji:'🍷',loc:'Moezel',acts:['Wijngaarden wandelen','Pittoreske dorpjes','Boottochtje op de Moezel'],tags:['explore','wine','boat'],leg:1},
{wd:'zo',d:3,type:'drive',emoji:'🚗',loc:'→Berchtes.',from:'Moezel',to:'Berchtesgaden',km:500,time:'~5u',route:'A1→A3→A8, laadstop Nürnberg',acts:['Roadtrip door Duitsland','Laadstop Nürnberg','Aankomst Beierse Alpen'],tags:['drive','germany','alps'],leg:1},
{wd:'ma',d:4,type:'explore',emoji:'⛵',loc:'Königssee',acts:['Königssee bootje (smaragdgroen meer)','Zwemmen in het meer','St. Bartholomä kerkje'],tags:['explore','lake','boat'],leg:2},
{wd:'di',d:5,type:'explore',emoji:'🥾',loc:'Berchtes.',acts:['Jenner kabelbaan','Watzmann wandelingen','Ramsau bij Berchtesgaden'],tags:['hike','cable car','alps'],leg:2},
{wd:'wo',d:6,type:'drive',emoji:'🚗',loc:'→Salzkam.',from:'Berchtesgaden',to:'Salzkammergut',km:100,time:'~1.5u',route:'B305→A1',acts:['Korte rit','Wolfgangsee zwemmen','Relaxen aan het meer'],tags:['drive','lake','short'],leg:2},
{wd:'do',d:7,type:'explore',emoji:'🏔️',loc:'Salzkam.',acts:['Schafberg tandradtrein','Dachstein 5 Fingers (viewpoint)','Zwemmen in bergmeer'],tags:['explore','mountains','viewpoint'],leg:3},
{wd:'vr',d:8,type:'drive',emoji:'🚗',loc:'→Tatra',from:'Salzkammergut',to:'Hoge Tatra (SK)',km:450,time:'~5u',route:'A1 Wien→D1, laadstop Bratislava',acts:['Roadtrip via Wenen','Laadstop Bratislava','Aankomst Hoge Tatra'],tags:['drive','slovakia','mountains'],leg:3},
{wd:'za',d:9,type:'explore',emoji:'🏔️',loc:'Tatra',acts:['Lomnický štít kabelbaan (2634m!)','Štrbské pleso bergmeer','Panorama Hoge Tatra'],tags:['explore','summit','cable car'],leg:4},
{wd:'zo',d:10,type:'explore',emoji:'🪜',loc:'Slov. Raj',acts:['Suchá Belá gorge (ladders & kettingen!)','Dobšinská ijsgrot','Avontuurlijke kloof-route'],tags:['explore','gorge','adventure'],leg:4},
{wd:'ma',d:11,type:'drive',emoji:'🚗',loc:'→Wachau',from:'Tatra',to:'Wachau/Krems',km:350,time:'~4u',route:'D1→Bratislava→A1/S33',acts:['Roadtrip naar Oostenrijk','Donau zwemmen','Aankomst Wachau'],tags:['drive','austria','river'],leg:4},
{wd:'di',d:12,type:'chill',emoji:'🚲',loc:'Wachau',acts:['Wijngaarden bezoeken','Fietsen langs de Donau','Relaxen'],tags:['chill','wine','cycling'],leg:5},
{wd:'wo',d:13,type:'drive',emoji:'🚗',loc:'→Rijnland',from:'Wachau',to:'Rijnland',km:500,time:'~5.5u',route:'A1→A3, laadstop Nürnberg',acts:['Roadtrip door Duitsland','Laadstop Nürnberg','Aankomst Rijnland'],tags:['drive','germany','return'],leg:5},
{wd:'do',d:14,type:'drive',emoji:'🏠',loc:'→Hove',from:'Rijnland',to:'Hove',km:400,time:'~4u',route:'A3→A4→E314',acts:['Laatste roadtrip-dag','Thuiskomst! 🎉'],tags:['drive','home','return'],leg:6},
{wd:'vr',d:15,type:'chill',emoji:'😴',loc:'Thuis',acts:['Uitpakken','Uitrusten','Vakantie verwerken'],tags:['home','chill','rest'],leg:6}
];

const COORDS_SP=[[51.155,4.475],[43.427,-2.783],[43.265,-4.950],[43.421,-4.756],[42.622,-0.111],[42.735,-0.009],[51.155,4.475]];
const COORDS_SK=[[51.155,4.475],[49.545,6.367],[47.555,12.988],[47.744,13.386],[49.165,20.213],[48.375,15.598],[50.35,7.6],[51.155,4.475]];
const LABELS_SP=['Hove','Baskenland','Picos','Llanes','Ordesa','Gavarnie','Hove'];
const LABELS_SK=['Hove','Moezel','Berchtesgaden','Salzkammergut','Hoge Tatra','Wachau','Rijnland','Hove'];

const TIPS_SP='<li>Gebruik ABRP voor laadplanning</li><li>Noordkust Spanje is fris (18-24°C) — perfect!</li><li>Vroeg boeken: Picos & Ordesa accommodatie</li><li>Wandelschoenen mee (Ruta del Cares, Ordesa)</li><li>Flexibel blijven — weer in de bergen wisselt</li>';
const TIPS_SK='<li>Gebruik ABRP voor laadplanning</li><li>350-400km range per dag is comfortabel</li><li>Vroeg boeken: Hoge Tatra accommodatie</li><li>Waterschoenen mee voor gorges (Slovenský Raj)</li><li>Flexibel blijven — weer in de bergen wisselt</li>';

let isHot=!location.hash.includes('slowakije');
let selectedDay=0;
let map,routeLines=[],markers=[],pulseMarker=null;
let scrollLocked=false;

function days(){return isHot?SPANJE:SLOWAKIJE}
function coords(){return isHot?COORDS_SP:COORDS_SK}
function labels(){return isHot?LABELS_SP:LABELS_SK}
function accent(){return isHot?'#ff9f48':'#48a9ff'}

function initMap(){
  map=L.map('map',{zoomControl:false,attributionControl:false}).setView([47,8],5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:18}).addTo(map);
}

function renderMap(){
  routeLines.forEach(l=>map.removeLayer(l));routeLines=[];
  markers.forEach(m=>map.removeLayer(m));markers=[];
  if(pulseMarker)map.removeLayer(pulseMarker);pulseMarker=null;

  const c=coords(),lb=labels(),ac=accent();
  // Draw full route faded
  var full=L.polyline(c,{color:ac,weight:2,opacity:.25}).addTo(map);routeLines.push(full);

  // Draw markers
  c.forEach((pt,i)=>{
    if(i===c.length-1&&i>0)return; // skip duplicate Hove at end
    var m=L.circleMarker(pt,{radius:6,color:ac,fillColor:ac,fillOpacity:.8,weight:2}).bindTooltip(lb[i],{permanent:false}).addTo(map);
    markers.push(m);
  });

  map.fitBounds(L.latLngBounds(c).pad(.1));
  highlightLeg();
}

function highlightLeg(){
  // Remove old highlight
  routeLines.forEach((l,i)=>{if(i>0)map.removeLayer(l)});
  routeLines=routeLines.slice(0,1);
  if(pulseMarker){map.removeLayer(pulseMarker);pulseMarker=null;}

  const day=days()[selectedDay];
  const leg=day.leg;
  const c=coords();
  const ac=accent();

  // Highlight active segment
  if(day.type==='drive'&&leg<c.length-1){
    var seg=L.polyline([c[leg],c[Math.min(leg+1,c.length-1)]],{color:ac,weight:5,opacity:1}).addTo(map);
    routeLines.push(seg);
    // Pulse marker at destination
    var pt=c[Math.min(leg+1,c.length-1)];
    pulseMarker=L.circleMarker(pt,{radius:10,color:'#fff',fillColor:ac,fillOpacity:1,weight:3}).addTo(map);
  } else {
    // Non-drive: pulse at current location
    var pt=c[Math.min(leg,c.length-1)];
    pulseMarker=L.circleMarker(pt,{radius:10,color:'#fff',fillColor:ac,fillOpacity:1,weight:3}).addTo(map);
  }

  // Update label
  var lbl=document.getElementById('map-label');
  lbl.textContent='Dag '+day.d+' · '+day.loc;
  lbl.style.borderColor=ac;lbl.style.color=ac;
}

function renderCal(){
  var cal=document.getElementById('cal');
  cal.innerHTML='';
  days().forEach((day,i)=>{
    var el=document.createElement('div');
    el.className='cal-day'+(i===selectedDay?' active':'')+(day.type==='drive'?' drive':'');
    el.innerHTML='<div class="wd">'+day.wd+'</div><div class="dn">'+day.d+'</div><div class="em">'+day.emoji+'</div><div class="loc">'+day.loc+'</div>';
    el.onclick=function(){selectDay(i,true)};
    cal.appendChild(el);
  });
  // Scroll active into view
  var active=cal.querySelector('.active');
  if(active)active.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
}

function renderDays(){
  var container=document.getElementById('days');
  container.innerHTML='';
  var badges={drive:'badge-drive',explore:'badge-explore',beach:'badge-beach',chill:'badge-chill'};
  var badgeLabels={drive:'🚗 Reisdag',explore:'🥾 Verkennen',beach:'🏖️ Strand',chill:'😌 Chill'};

  days().forEach(function(day,i){
    var card=document.createElement('div');
    card.className='day-card'+(i===selectedDay?' active':'');
    card.id='day-'+i;
    card.setAttribute('data-day',i);

    var html='<div class="date-hdr"><span class="day-emoji">'+day.emoji+'</span> '+day.wd+' '+day.d+' augustus</div>';
    html+='<span class="badge '+(badges[day.type]||'badge-explore')+'">'+(badgeLabels[day.type]||day.type)+'</span>';

    if(day.type==='drive'){
      html+='<div class="drive-info"><div class="route-label">Route</div><div class="from-to">'+day.from+' → '+day.to+'</div><div class="meta"><span>📏 '+day.km+' km</span><span>⏱️ '+day.time+'</span></div><div class="desc">'+day.route+'</div></div>';
    }

    html+='<ul>'+day.acts.map(function(a){return '<li>'+a+'</li>'}).join('')+'</ul>';
    html+='<div class="tags">'+day.tags.map(function(t){return '<span class="tag">'+t+'</span>'}).join('')+'</div>';
    card.innerHTML=html;
    var stopMap=isHot?{2:'baskenland',4:'picos',5:'picos',7:'llanes',9:'ordesa',10:'ordesa',12:'gavarnie'}:{2:'moezel',4:'berchtesgaden',5:'berchtesgaden',7:'salzkammergut',9:'tatra',10:'tatra',12:'wachau'};
    var stopId=stopMap[day.d];
    if(stopId){card.style.cursor='pointer';card.onclick=function(){window.location.href='day.html?route='+(isHot?'spanje':'slowakije')+'&stop='+stopId};}else{card.style.cursor='default';}
    container.appendChild(card);
  });
}

function selectDay(i,scroll){
  selectedDay=i;
  // Update cal
  document.querySelectorAll('.cal-day').forEach(function(el,idx){el.classList.toggle('active',idx===i)});
  var calActive=document.querySelector('.cal-day.active');
  if(calActive)calActive.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  // Update day cards
  document.querySelectorAll('.day-card').forEach(function(el,idx){el.classList.toggle('active',idx===i)});
  // Highlight map
  highlightLeg();
  // Scroll to day card
  if(scroll){
    scrollLocked=true;
    var target=document.getElementById('day-'+i);
    if(target)target.scrollIntoView({behavior:'smooth',block:'start'});
    setTimeout(function(){scrollLocked=false},800);
  }
}

function render(){
  document.documentElement.style.setProperty('--accent',accent());
  document.getElementById('kicker').textContent=isHot?'Route A — Vuur & bergen':'Route B — Bergen & meren';
  document.getElementById('title').textContent=isHot?'Noord-Spanje':'Slowakije & Alpen';
  document.getElementById('sub').textContent=isHot?'Baskenland • Picos de Europa • Ordesa • Pyreneeën':'Moezel • Berchtesgaden • Salzkammergut • Hoge Tatra • Wachau';
  var km=isHot?3400:2700,stops=isHot?6:5,landen=isHot?2:5;
  document.getElementById('stats').innerHTML='<div class="stat"><div class="val">15</div><div class="lbl">Dagen</div></div><div class="stat"><div class="val">'+km+'</div><div class="lbl">Kilometer</div></div><div class="stat"><div class="val">'+stops+'</div><div class="lbl">Stops</div></div><div class="stat"><div class="val">'+landen+'</div><div class="lbl">Landen</div></div>';
  document.getElementById('tips').innerHTML='<h2>💡 Tips</h2><ul>'+(isHot?TIPS_SP:TIPS_SK)+'</ul>';
  document.getElementById('fab').innerHTML='<span class="emoji">'+(isHot?'🔥':'❄️')+'</span><span class="lbl">'+(isHot?'Too Hot!':'Cool 🏔️')+'</span>';
  document.getElementById('fab').style.borderColor=accent();
  renderCal();
  renderDays();
  renderMap();
}

function toggle(){isHot=!isHot;selectedDay=0;render();history.replaceState(null,'','#'+(isHot?'spanje':'slowakije'))}

// Scroll spy: update selected day based on which card is in view
function setupScrollSpy(){
  var mapSection=document.getElementById('map-section');
  var observer=new IntersectionObserver(function(entries){
    if(scrollLocked)return;
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        var idx=parseInt(entry.target.getAttribute('data-day'));
        if(idx!==selectedDay){
          selectedDay=idx;
          document.querySelectorAll('.cal-day').forEach(function(el,i){el.classList.toggle('active',i===idx)});
          var calActive=document.querySelector('.cal-day.active');
          if(calActive)calActive.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
          document.querySelectorAll('.day-card').forEach(function(el,i){el.classList.toggle('active',i===idx)});
          highlightLeg();
        }
      }
    });
  },{rootMargin:'-200px 0px -60% 0px',threshold:0.1});
  setTimeout(function(){
    document.querySelectorAll('.day-card').forEach(function(el){observer.observe(el)});
  },100);
  // Compact map on scroll
  window.addEventListener('scroll',function(){
    var st=window.scrollY;
    mapSection.classList.toggle('compact',st>400);
    document.getElementById('cal-wrap').style.top=st>400?'140px':'300px';
    setTimeout(function(){map.invalidateSize()},350);
  });
}

initMap();
render();
setupScrollSpy();
</script>
