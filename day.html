<head>
<meta charset="UTF-8">

<title>Roadtrip 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0f1729;--surface:#1a2340;--card:#212d4a;--text:#e8eaf0;--muted:#8892a8;--accent:#ff9f48;--radius:12px;--font-head:'Bebas Neue',sans-serif;--font-body:'Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;padding-bottom:60px}
h1,h2,h3{font-family:var(--font-head);letter-spacing:1px}
.container{max-width:900px;margin:0 auto;padding:0 16px}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:.85rem;padding:16px 0;transition:.2s}
.back:hover{color:var(--accent)}
.day-nav{display:flex;justify-content:center;align-items:stretch;gap:12px;padding:16px 16px 0}
.day-nav a{background:var(--card);border-radius:var(--radius);padding:10px 8px;text-align:center;text-decoration:none;color:#fff;width:80px;transition:.2s;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.day-nav a:hover{border-color:var(--accent);transform:scale(1.05)}
.day-nav .wd{font-size:.7rem;color:var(--muted);text-transform:uppercase}
.day-nav .dn{font-size:1.3rem;font-weight:700}
.day-nav .em{font-size:1.2rem;margin:2px 0}
.day-nav .loc{font-size:.6rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}
.day-nav a.drive::after{content:'';position:absolute;bottom:4px;left:20%;right:20%;height:3px;border-radius:2px;background:var(--accent)}
.hero{text-align:center;padding:12px 16px 16px}
.hero .flag{font-size:2.5rem}
.hero .flag img{height:40px;vertical-align:middle}
.hero h1{font-size:clamp(2rem,5vw,3rem);line-height:1.1;margin:8px 0 4px}
.hero .sub{color:var(--muted);font-size:.9rem}
.weather{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;padding:16px 0;margin:0 auto;max-width:900px}
.weather-day{background:var(--card);border-radius:var(--radius);padding:12px 16px;text-align:center;min-width:90px;cursor:pointer;transition:.2s;text-decoration:none;color:inherit}
.weather-day:hover{background:var(--surface);transform:scale(1.05)}
.weather-day .wicon{font-size:1.8rem}
.weather-day .wtemp{font-size:1.1rem;font-weight:700;margin:4px 0}
.weather-day .wlabel{font-size:.7rem;color:var(--muted);text-transform:uppercase}
.gallery-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:16px 0;scrollbar-width:none;display:flex;justify-content:center}
.gallery-wrap::-webkit-scrollbar{display:none}
.gallery{display:flex;gap:12px;padding:0 16px;min-width:max-content}
.gallery img{width:280px;height:200px;border-radius:var(--radius);object-fit:cover;cursor:pointer;transition:.2s}
.gallery img:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(0,0,0,.5)}
.gallery figure{margin:0;flex-shrink:0;text-align:center}
.gallery figcaption{color:var(--muted);font-size:.75rem;margin-top:6px;max-width:280px}
.section{margin:24px 16px;background:var(--card);border-radius:var(--radius);padding:20px}
.section h2{font-size:1.3rem;margin-bottom:14px;color:var(--accent)}
.activity{padding:12px 0;border-bottom:1px solid var(--surface)}
.activity:last-child{border:none}
.activity .aname{font-weight:700;font-size:.95rem;margin-bottom:4px}
.activity .adesc{font-size:.82rem;color:var(--muted)}
.map-section{margin:24px 16px;background:var(--card);border-radius:var(--radius);padding:20px;overflow:hidden}
.map-section h2{font-family:var(--font-head);font-size:1.3rem;margin-bottom:14px;color:var(--accent);letter-spacing:1px}
#map{height:200px;border-radius:var(--radius);z-index:0}
.video-wrap{margin:24px 16px;border-radius:var(--radius);overflow:hidden;aspect-ratio:16/9}
.video-wrap iframe{width:100%;height:100%;border:none}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;cursor:zoom-out}
.lightbox.active{display:flex}
.lightbox img{max-width:85vw;max-height:80vh;border-radius:var(--radius);object-fit:contain}
.lightbox .caption{color:#fff;font-size:1rem;margin-top:12px;text-align:center;font-weight:600;max-width:90vw}
.lightbox .nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:2rem;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.lightbox .nav:hover{background:rgba(255,255,255,.3)}
.lightbox .nav.prev{left:16px}
.lightbox .nav.next{right:16px}
</style>
</head>

var stop=STOPS[stopId];
if(!stop){document.body.innerHTML='<p style="padding:40px;text-align:center">Stop niet gevonden. <a href="index.html" style="color:var(--accent)">Terug</a></p>';throw new Error('stop not found')}

// Navigation
var spStops=['larochelle','baskenland','picos','llanes','ordesa','gavarnie'];
var ooStops=['moezel','berchtesgaden','salzkammergut','tatra','wachau'];
var routeStops=isHot?spStops:ooStops;
var currentIdx=routeStops.indexOf(stopId);
var navEl=document.getElementById('day-nav');
var prevStop=currentIdx>0?routeStops[currentIdx-1]:null;
var nextStop=currentIdx<routeStops.length-1?routeStops[currentIdx+1]:null;
function navCard(id){
  var s=STOPS[id];
  var dayNum=s.days.replace(/Dag\s*/,'').split('-')[0];
  var dateStr=s.dates.split(' ')[0];
  var emojis={larochelle:'⚓',baskenland:'🍽️',picos:'🏔️',llanes:'🌊',ordesa:'🪷',gavarnie:'⛰️',moezel:'🍷',berchtesgaden:'🚣',salzkammergut:'🚂',tatra:'⛓️',wachau:'🚴'};
  var emoji=emojis[id]||'🏔️';
  return '<a href="day.html?route='+route+'&stop='+id+'"'+(s.travel?' class="drive"':'')+'><div class="wd">'+dateStr+'</div><div class="dn">'+dayNum+'</div><div class="em">'+emoji+'</div><div class="loc">→'+s.name+'</div></a>';
}
var navHtml='';
if(prevStop){navHtml+=navCard(prevStop,!!STOPS[prevStop].travel);}
navHtml+='<a href="index.html"><div class="wd">&nbsp;</div><div class="dn">🏠</div><div class="em">&nbsp;</div><div class="loc">Home</div></a>';
if(nextStop){navHtml+=navCard(nextStop,!!STOPS[nextStop].travel);}
navEl.innerHTML=navHtml;

document.title='Roadtrip 2026 \u2013 '+stop.name;
var flagCodes={'\ud83c\uddeb\ud83c\uddf7':'fr','\ud83c\uddea\ud83c\uddf8':'es','\ud83c\udde9\ud83c\uddea':'de','\ud83c\udde6\ud83c\uddf9':'at','\ud83c\uddf8\ud83c\uddf0':'sk'};
var cc=flagCodes[stop.country]||'fr';
document.getElementById('flag').innerHTML='<img src="https://flagcdn.com/w80/'+cc+'.png" alt="'+cc+'">';
document.getElementById('title').textContent=stop.name;
document.getElementById('sub').textContent=stop.days+' \u2022 '+stop.dates+' 2026';

// Gallery + Lightbox
var gal=document.getElementById('gallery');
var lb=document.createElement('div');lb.className='lightbox';
lb.innerHTML='<button class="nav prev">❮</button><img><div class="caption"></div><button class="nav next">❯</button>';
document.body.appendChild(lb);
var lbIdx=0;
function lbShow(i){lbIdx=((i%stop.images.length)+stop.images.length)%stop.images.length;lb.querySelector('img').src=stop.images[lbIdx].url;lb.querySelector('.caption').textContent=stop.images[lbIdx].cap;lb.classList.add('active')}
lb.onclick=function(e){if(e.target===lb||e.target===lb.querySelector('img'))lb.classList.remove('active')};
lb.querySelector('.prev').onclick=function(e){e.stopPropagation();lbShow(lbIdx-1)};
lb.querySelector('.next').onclick=function(e){e.stopPropagation();lbShow(lbIdx+1)};
document.addEventListener('keydown',function(e){if(!lb.classList.contains('active'))return;if(e.key==='ArrowLeft')lbShow(lbIdx-1);else if(e.key==='ArrowRight')lbShow(lbIdx+1);else if(e.key==='Escape')lb.classList.remove('active')});
stop.images.forEach(function(img,idx){
  var fig=document.createElement('figure');
  var el=document.createElement('img');
  el.src=img.url;el.alt=img.cap;el.loading='lazy';
  el.onclick=function(){lbShow(idx)};
  var cap=document.createElement('figcaption');cap.textContent=img.cap;
  fig.appendChild(el);fig.appendChild(cap);
  gal.appendChild(fig);
});

// Activities
var acts=document.getElementById('acts');
if(stop.travel){
  var td=document.createElement('div');td.className='activity';
  var mapsLink=stop.mapsUrl?'<a href="'+stop.mapsUrl+'" target="_blank" style="color:var(--accent);font-size:.8rem;margin-left:8px">📍 Route in Google Maps</a>':'';
  td.innerHTML='<div class="aname">🚗 Reisdag'+mapsLink+'</div><div class="adesc">'+stop.travel.replace(/^🚗\s*/,'')+'</div>';
  acts.appendChild(td);
}
stop.activities.forEach(function(a){
  var parts=a.split(' - ');
  var div=document.createElement('div');
  div.className='activity';
  div.innerHTML='<div class="aname">'+parts[0]+'</div>'+(parts[1]?'<div class="adesc">'+parts[1]+'</div>':'');
  acts.appendChild(div);
});

// Video
if(stop.video){
  var vw=document.getElementById('video-wrap');
  vw.style.display='block';
  vw.innerHTML='<iframe src="https://www.youtube.com/embed/'+stop.video+'?rel=0" allowfullscreen loading="lazy"></iframe>';
}

// Map
var map=L.map('map',{scrollWheelZoom:false}).setView([stop.lat,stop.lon],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(map);
L.marker([stop.lat,stop.lon]).addTo(map).bindPopup('<b>'+stop.name+'</b>');
setTimeout(function(){map.invalidateSize()},200);

// Weather
function wmoIcon(code){
  if(code<=1)return'\u2600\ufe0f';if(code<=3)return'\u26c5';if(code<=48)return'\ud83c\udf2b\ufe0f';
  if(code<=67)return'\ud83c\udf27\ufe0f';if(code<=77)return'\ud83c\udf28\ufe0f';if(code<=82)return'\ud83c\udf26\ufe0f';return'\u26c8\ufe0f';
}
var wUrl='https://api.open-meteo.com/v1/forecast?latitude='+stop.lat+'&longitude='+stop.lon+'&current=temperature_2m,weathercode&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&forecast_days=3';
fetch(wUrl).then(function(r){return r.json()}).then(function(d){
  var html='';
  var msnBase='https://www.msn.com/en-us/weather/forecast/in-'+encodeURIComponent(stop.name);
  html+='<a class="weather-day" href="'+msnBase+'" target="_blank"><div class="wlabel">Nu</div><div class="wicon">'+wmoIcon(d.current.weathercode)+'</div><div class="wtemp">'+Math.round(d.current.temperature_2m)+'\u00b0C</div></a>';
  for(var i=0;i<d.daily.time.length;i++){
    var day=new Date(d.daily.time[i]).toLocaleDateString('nl',{weekday:'short'});
    html+='<a class="weather-day" href="'+msnBase+'" target="_blank"><div class="wlabel">'+day+'</div><div class="wicon">'+wmoIcon(d.daily.weathercode[i])+'</div><div class="wtemp">'+Math.round(d.daily.temperature_2m_max[i])+'\u00b0 / '+Math.round(d.daily.temperature_2m_min[i])+'\u00b0</div></a>';
  }
  document.getElementById('weather').innerHTML=html;
}).catch(function(){document.getElementById('weather').innerHTML='<span style="color:var(--muted)">Weer niet beschikbaar</span>'});
</script>
