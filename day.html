<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roadtrip 2026 – Stop Detail</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1729;--surface:#1a2340;--card:#212d4a;--text:#e8eaf0;--muted:#8892a8;--accent:#ff9f48;--radius:12px;--font-head:'Bebas Neue',sans-serif;--font-body:'Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;padding-bottom:60px}
h1,h2,h3{font-family:var(--font-head);letter-spacing:1px}
.container{max-width:800px;margin:0 auto;padding:0 16px}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:.9rem;padding:16px 0;font-weight:600}
.back:hover{text-decoration:underline}
.hero{text-align:center;padding:32px 16px 24px}
.hero .flag{font-size:2.5rem}
.hero h1{font-size:clamp(2rem,5vw,3rem);line-height:1.1;margin:8px 0}
.hero .dates{color:var(--muted);font-size:1rem}
.weather{background:var(--surface);border-radius:var(--radius);padding:20px;margin:16px auto;max-width:500px;text-align:center}
.weather .current{font-size:2.5rem;margin:8px 0}
.weather .temp{font-size:1.4rem;font-weight:700}
.weather .forecast{display:flex;justify-content:center;gap:16px;margin-top:12px}
.weather .fc-day{text-align:center;font-size:.8rem;color:var(--muted)}
.weather .fc-day .icon{font-size:1.3rem}
.weather .fc-day .temps{font-size:.75rem;color:var(--text)}
.section-title{font-size:1.6rem;margin:32px 0 16px;padding-left:4px}
.activities{display:grid;gap:16px}
.act-card{background:var(--card);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.act-card img{width:100%;height:200px;object-fit:cover;background:var(--surface)}
.act-card .info{padding:16px}
.act-card h3{font-size:1.2rem;margin-bottom:6px}
.act-card p{font-size:.9rem;color:var(--muted);line-height:1.5}
.videos{display:grid;gap:16px;margin-top:16px}
.video-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:var(--radius);overflow:hidden}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.loading{text-align:center;padding:40px;color:var(--muted)}
@media(min-width:600px){.activities{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
<a class="back" href="index.html">← Terug naar overzicht</a>
<div class="hero" id="hero"></div>
<div class="weather" id="weather"><div class="loading">Weer laden...</div></div>
<h2 class="section-title">Activiteiten</h2>
<div class="activities" id="activities"></div>
<h2 class="section-title" id="video-title" style="display:none">Video's</h2>
<div class="videos" id="videos"></div>
</div>
<script>

},

],videos:[]},

{title:'St. Bartholomä',desc:'Iconisch wit-rood kerkje op een schiereiland in het meer, met de dramatische Watzmann oostwand als achtergrond.',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/K%C3%B6nigssee_St._Bartholom%C3%A4_02.jpg/1200px-K%C3%B6nigssee_St._Bartholom%C3%A4_02.jpg'},
{title:'Jenner & Watzmann',desc:'Jenner kabelbaan naar 1874m voor panorama over het hele Berchtesgadener Land. Watzmann: iconische bergtop.',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/Watzmann_Ostwand.jpg/1200px-Watzmann_Ostwand.jpg'},
{title:'Ramsau',desc:'Het meest gefotografeerde dorpje van Duitsland: kerkje met Reiteralpe als achtergrond aan kristalhelder beekje.',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/Ramsau_bei_Berchtesgaden%2C_Ramsauer_Ache.jpg/1200px-Ramsau_bei_Berchtesgaden%2C_Ramsauer_Ache.jpg'}
],videos:['VV8qJ8c7Lak']},
salzkammergut:{name:'Salzkammergut',days:'Dag 7',dates:'do 7 aug',flag:'🇦🇹',lat:47.744,lon:13.386,activities:[
{title:'Schafberg',desc:'Met de nostalgische stoomtandradtrein omhoog naar 1783m. Boven: 360° panorama over 7 meren.',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Schafbergbahn_2019.jpg/1200px-Schafbergbahn_2019.jpg'},
{title:'Dachstein 5 Fingers',desc:'Vijf vingers reiken over de afgrond: spectaculair uitkijkplatform op 2100m met uitzicht over het Salzkammergut.',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/14/Five_fingers_viewing_platform.jpg/1200px-Five_fingers_viewing_platform.jpg'},

],videos:[]},

],videos:['x1YiJgA8lpw']},
wachau:{name:'Wachau',days:'Dag 12',dates:'di 12 aug',flag:'🇦🇹',lat:48.375,lon:15.598,activities:[
{title:'Donau zwemmen',desc:'Wild zwemmen in de Donau bij Krems. Verrassend schoon water met uitzicht op wijngaarden en kastelen.',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Wachau_west.jpg/1200px-Wachau_west.jpg'},
{title:'Fietsen langs de Donau',desc:'De Donaufietsroute door de Wachau: vlakke paden tussen abrikozentuinen en historische dorpjes.',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Wachau_D%C3%BCrnstein_2.JPG/1200px-Wachau_D%C3%BCrnstein_2.JPG'},
{title:'Wijngaarden Krems',desc:'De steile terrassen van de Wachau produceren wereldberoemde Grüner Veltliner en Riesling. Proeverijen overal.',img:'https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Weissenkirchen_in_der_Wachau.jpg/1200px-Weissenkirchen_in_der_Wachau.jpg'}
],videos:[]}
}
};

const params=new URLSearchParams(location.search);
const route=params.get('route');
const stop=params.get('stop');
const data=STOPS[route]&&STOPS[route][stop];

if(!data){document.getElementById('hero').innerHTML='<h1>Stop niet gevonden</h1>';document.getElementById('weather').style.display='none';}
else{
  document.title='Roadtrip 2026 – '+data.name;
  if(route==='slowakije')document.documentElement.style.setProperty('--accent','#48a9ff');
  document.getElementById('hero').innerHTML='<div class="flag">'+data.flag+'</div><h1>'+data.name+'</h1><div class="dates">'+data.days+' · '+data.dates+'</div>';

  // Weather
  fetch('https://api.open-meteo.com/v1/forecast?latitude='+data.lat+'&longitude='+data.lon+'&current=temperature_2m,weathercode&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&forecast_days=3')
  .then(r=>r.json()).then(w=>{
    const wmo=c=>{if(c===0)return'☀️';if(c<=3)return'⛅';if(c<=48)return'🌫️';if(c<=67)return'🌧️';if(c<=77)return'🌨️';if(c<=82)return'🌦️';return'⛈️'};
    const days=['Vandaag','Morgen','Overmorgen'];
    let html='<div class="current">'+wmo(w.current.weathercode)+'</div><div class="temp">'+Math.round(w.current.temperature_2m)+'°C nu</div>';
    html+='<div class="forecast">';
    w.daily.time.forEach((t,i)=>{html+='<div class="fc-day"><div class="icon">'+wmo(w.daily.weathercode[i])+'</div><div>'+days[i]+'</div><div class="temps">'+Math.round(w.daily.temperature_2m_min[i])+'° / '+Math.round(w.daily.temperature_2m_max[i])+'°</div></div>'});
    html+='</div>';
    document.getElementById('weather').innerHTML=html;
  }).catch(()=>{document.getElementById('weather').innerHTML='<div style="color:var(--muted)">Weer niet beschikbaar</div>'});

  // Activities
  const actEl=document.getElementById('activities');
  data.activities.forEach(a=>{
    actEl.innerHTML+='<div class="act-card"><img src="'+a.img+'" alt="'+a.title+'" loading="lazy"><div class="info"><h3>'+a.title+'</h3><p>'+a.desc+'</p></div></div>';
  });

  // Videos
  if(data.videos&&data.videos.length){
    document.getElementById('video-title').style.display='';
    const vidEl=document.getElementById('videos');
    data.videos.forEach(id=>{
      vidEl.innerHTML+='<div class="video-wrap"><iframe src="https://www.youtube.com/embed/'+id+'" allowfullscreen loading="lazy"></iframe></div>';
    });
  }
}
</script>
</body>
</html>
