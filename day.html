<style>
:root{--bg:#0f1729;--surface:#1a2340;--card:#212d4a;--text:#e8eaf0;--muted:#8892a8;--accent:#ff9f48;--accent2:#48a9ff;--radius:12px;--font-head:'Bebas Neue',sans-serif;--font-body:'Inter',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh}
h1,h2,h3{font-family:var(--font-head);letter-spacing:1px}
.back-btn{position:fixed;top:16px;left:16px;z-index:1000;background:rgba(33,45,74,.9);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:10px 18px;color:var(--text);text-decoration:none;font-size:.85rem;font-weight:600;transition:.2s;display:flex;align-items:center;gap:6px}
.back-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.hero{position:relative;height:50vh;min-height:320px;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;background:var(--surface)}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.6);transition:opacity .5s}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,transparent 60%)}
.hero-content{position:relative;z-index:2;text-align:center;padding:40px 20px 30px}
.hero-content .kicker{font-size:.8rem;text-transform:uppercase;letter-spacing:3px;color:var(--accent);margin-bottom:8px}
.hero-content h1{font-size:clamp(2.5rem,8vw,4rem);line-height:1}
.hero-content .date{color:var(--muted);margin-top:8px;font-size:1rem}
.container{max-width:800px;margin:0 auto;padding:0 16px}
.weather-widget{background:rgba(33,45,74,.8);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:20px;margin:-40px auto 30px;position:relative;z-index:10;max-width:400px;text-align:center}
.weather-widget .temp{font-family:var(--font-head);font-size:2.5rem;color:var(--accent)}
.weather-widget .desc{color:var(--muted);font-size:.9rem;margin-top:4px}
.weather-widget .details{display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:.8rem;color:var(--muted)}
.section{margin:40px 0}
.section h2{font-size:1.8rem;margin-bottom:16px;color:var(--text)}
.activities{display:flex;flex-direction:column;gap:12px}
.activity-card{background:var(--card);border-radius:var(--radius);padding:16px 20px;border-left:4px solid var(--accent);display:flex;align-items:center;gap:14px}
.activity-card .emoji{font-size:1.5rem}
.activity-card .text{font-size:.95rem}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.photo-grid img{width:100%;height:200px;object-fit:cover;border-radius:var(--radius);transition:transform .3s;cursor:pointer;background:var(--surface)}
.photo-grid img:hover{transform:scale(1.03)}
.video-embed{position:relative;width:100%;padding-bottom:56.25%;border-radius:var(--radius);overflow:hidden;background:var(--surface);margin-bottom:16px}
.video-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.nav-days{display:flex;justify-content:space-between;align-items:center;padding:30px 0 60px;gap:12px}
.nav-btn{background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:12px 24px;color:var(--text);text-decoration:none;font-weight:600;font-size:.9rem;transition:.2s}
.nav-btn:hover{background:var(--accent);color:#000;border-color:var(--accent)}
.nav-btn.disabled{opacity:.3;pointer-events:none}
footer{text-align:center;color:var(--muted);font-size:.8rem;padding:20px 16px 40px;border-top:1px solid rgba(255,255,255,.06)}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:600px){.photo-grid{grid-template-columns:1fr 1fr}.hero{height:40vh;min-height:260px}}
</style>
</head>

if(!day){document.body.innerHTML='<p style="padding:40px;text-align:center">Dag niet gevonden</p>';throw new Error('bad day');}

// Set accent
document.documentElement.style.setProperty('--accent',route.accent);

// Back button with hash
document.getElementById('backBtn').href='index.html#'+(routeKey==='spanje'?'spanje':'slowakije');

// Hero
document.getElementById('kicker').textContent=route.name+' · Dag '+day.d;
document.getElementById('title').textContent=day.emoji+' '+day.loc;
document.getElementById('dateStr').textContent=day.date;
if(day.hero){document.getElementById('heroBg').style.backgroundImage='url('+day.hero+')';}

// Weather from Open-Meteo
(async function(){
  const w=document.getElementById('weather');
  try{
    const [lat,lon]=day.coord;
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&timezone=auto&forecast_days=3`);
    const data=await r.json();
    const d=data.daily;
    const wmo={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌧️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'🌨️',80:'🌦️',81:'🌧️',82:'🌧️',95:'⛈️',96:'⛈️',99:'⛈️'};
    const icon=wmo[d.weathercode[0]]||'🌤️';
    w.innerHTML=`<div style="font-size:2.5rem">${icon}</div><div class="temp">${Math.round(d.temperature_2m_max[0])}° / ${Math.round(d.temperature_2m_min[0])}°</div><div class="desc">Neerslag: ${d.precipitation_sum[0]}mm</div><div class="details"><span>Morgen: ${Math.round(d.temperature_2m_max[1])}°${wmo[d.weathercode[1]]||''}</span><span>Overmorgen: ${Math.round(d.temperature_2m_max[2])}°${wmo[d.weathercode[2]]||''}</span></div>`;
  }catch(e){w.innerHTML='<div style="color:var(--muted)">Weer niet beschikbaar</div>';}
})();

// Activities
const acts=document.getElementById('activities');
const emojis=['🎯','⛰️','🏊','📸','🍽️','🚶','🏔️','🌊','🎒','🌅','🚗','🏖️','⛵','🍷','🚲','🧗'];
day.acts.forEach((a,i)=>{
  acts.innerHTML+=`<div class="activity-card"><span class="emoji">${emojis[i%emojis.length]}</span><span class="text">${a}</span></div>`;
});

// Photos
const photoGrid=document.getElementById('photos');
const photoSection=document.getElementById('photoSection');
if(day.photos.length===0){photoSection.style.display='none';}
else{day.photos.forEach(url=>{photoGrid.innerHTML+=`<img src="${url}" loading="lazy" alt="Foto ${day.loc}" onerror="this.style.display='none'">`});}

// Videos
const videoDiv=document.getElementById('videos');
const videoSection=document.getElementById('videoSection');
if(!day.videos||day.videos.length===0){videoSection.style.display='none';}
else{day.videos.forEach(id=>{videoDiv.innerHTML+=`<div class="video-embed"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen loading="lazy"></iframe></div>`});}

// Nav
const nav=document.getElementById('navDays');
const prev=dayNum>1?`<a class="nav-btn" href="day.html?route=${routeKey}&day=${dayNum-1}">← Dag ${dayNum-1}</a>`:`<span class="nav-btn disabled">← Dag 0</span>`;
const next=dayNum<15?`<a class="nav-btn" href="day.html?route=${routeKey}&day=${dayNum+1}">Dag ${dayNum+1} →</a>`:`<span class="nav-btn disabled">Dag 16 →</span>`;
nav.innerHTML=prev+next;
</script>
</body>
</html>
